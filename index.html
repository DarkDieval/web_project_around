<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Perfiles Interactivos para publicar fotos de vivencias personales"
    />
    <meta name="author" content="Dieval" />
    <meta
      name="keywords"
      content="aroud, tripleten, jacques, cousteau, yosemite"
    />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Around the U.S.</title>
  </head>

  <body>
    <div class="page">
      <!--Header-->

      <header class="header">
        <h1 class="header-title">
          Around<span class="header-title__complement">the U.S.</span>
        </h1>
        <hr class="header__divider" />
      </header>
      <main>
        <!--Header Information-->

        <section class="profile-header-information">
          <div class="profile-header-container">
            <img
              src="./images/JacquesCousteau.jpg"
              alt="JacquesCousteauExplorer"
              class="profile-header-img"
            />
            <div class="profile-header-information-container">
              <div class="profile-header-edit-information-container">
                <h2 class="profile-header-name">
                  <span class="span-profile-name">Jacques Cousteau</span>
                </h2>

                <!--Profile Button-->

                <button class="profile-name-edit-button"></button>
              </div>
              <p class="profile-header-occupation">
                <span class="span-profile-about">Explorer</span>
              </p>

              <!--Modal Sprint 7-->

              <div class="profile-popup-container">
                <div class="profile-content-wrapper">
                  <button class="profile-popup-close-button outside">
                    <svg viewBox="0 0 24 24">
                      <path
                        fill="currentColor"
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"
                      />
                    </svg>
                  </button>
                  <div class="profile-content">
                    <div class="profile-popup-header">
                      <h2 class="profile-popup-title">Editar perfil</h2>
                    </div>
                    <form class="profile-form" id="profileEditForm">
                      <div class="profile-form-group no-margin">
                        <input
                          class="profile-name-input"
                          type="text"
                          placeholder="Nombre"
                        />
                      </div>
                      <div class="profile-form-group no-margin">
                        <input
                          class="profile-about-input"
                          type="text"
                          placeholder="Acerca de mi"
                        />
                      </div>
                      <button type="submit" class="profile-save-button">
                        Guardar
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>

            <!--Add Button-->

            <button class="profile-add-button" id="profileAddButton"></button>
          </div>
        </section>

        <!--Modal Sprint 8-->

        <div class="gallery-popup-container">
          <div class="gallery-content-wrapper">
            <button class="gallery-popup-close-button outside">
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"
                />
              </svg>
            </button>
            <div class="gallery-content">
              <div class="gallery-popup-header">
                <h2 class="gallery-popup-title">Nuevo Lugar</h2>
              </div>
              <form class="gallery-form" id="galleryAddForm">
                <div class="gallery-form-group no-margin">
                  <input
                    class="gallery-title-image-input"
                    type="text"
                    placeholder="Titulo"
                  />
                </div>
                <div class="gallery-form-group no-margin">
                  <input
                    class="gallery-link-input"
                    type="text"
                    placeholder="Enlace a la imagen"
                  />
                </div>
                <button type="submit" class="gallery-create-button">
                  Crear
                </button>
              </form>
            </div>
          </div>
        </div>

        <!--Gallery Section-->

        <section class="profile-gallery" id="profileGallery">
          <div class="profile-gallery-container"></div>
        </section>

        <!--Template-->

        <template id="profileGalleryTemplate">
          <div class="profile-gallery-card">
            <button class="profile-gallery-remove-card-button">🗑</button>
            <img src="" alt="" class="profile-gallery__image" />
            <div class="profile-gallery-card__info">
              <h3 class="profile-gallery-card__title"></h3>
              <button class="profile-like-button"></button>
            </div>
          </div>
        </template>
        <section class="profile-footer">
          <h3 class="profile-footer-text">&copy; 2025 Dieval</h3>
        </section>
      </main>
    </div>
    <div class="popup-image">
      <img id="popup-img" src="" class="popup-image-container" />
      <button class="popup-image-close-button outside">
        <svg viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"
          />
        </svg>
      </button>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
